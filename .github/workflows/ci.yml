name: CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y socat
      - run: cargo build --verbose
      - run: cargo test --lib --verbose
      - name: Integration tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --test serial_integration --verbose
      - name: Release build
        run: cargo build --release --verbose
      - name: Derive version tag
        id: ver
        shell: bash
        run: |
          VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - name: Upload Linux binary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: uart-mon-${{ steps.ver.outputs.tag }}-linux-x86_64
          path: target/release/uart-mon
          if-no-files-found: error
      - name: Upload Windows binary
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: uart-mon-${{ steps.ver.outputs.tag }}-windows-x86_64
          path: target/release/uart-mon.exe
          if-no-files-found: error
